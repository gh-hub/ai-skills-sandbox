services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thanks_claude
      POSTGRES_PASSWORD: thanks_claude
      POSTGRES_DB: thanks_claude
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thanks_claude"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://thanks_claude:thanks_claude@postgres:5432/thanks_claude
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:
